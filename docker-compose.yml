# Single-VPS topology (architecture §3, plan §4/§12).
# Services: bot, worker, redis, anki-headless, anki-sync-server, caddy.

x-vocab-image: &vocab-image
  image: ${VOCAB_IMAGE:-ghcr.io/appledore-labs/lexibot:latest}
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped

services:
  bot:
    <<: *vocab-image
    command: ["python", "-m", "lexibot"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - bot-data:/app/data
    expose:
      - "8080"
    networks:
      - vocabnet

  worker:
    <<: *vocab-image
    command: ["arq", "lexibot.worker.settings.WorkerSettings"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - bot-data:/app/data
    networks:
      - vocabnet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vocabnet

  anki-headless:
    # Browser desktop + AnkiConnect pre-installed (plan §12).
    image: ${ANKI_HEADLESS_IMAGE:-mlcivilengineer/anki-desktop-docker:main}
    restart: unless-stopped
    environment:
      - SYNC_SERVER=http://anki-sync-server:8080
    volumes:
      - anki-profile:/config
    # AnkiConnect (8765) is reachable only on the internal network, never published.
    expose:
      - "8765"
    ports:
      - "6080:3001"
    networks:
      - vocabnet

  anki-sync-server:
    image: ${ANKI_SYNC_IMAGE:-chrislongros/anki-sync-server-enhanced:latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - anki-sync-data:/data
    expose:
      - "8080"
    networks:
      - vocabnet

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    depends_on:
      - bot
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - vocabnet

  vector:
    image: timberio/vector:0.34.0-alpine
    restart: unless-stopped
    environment:
      - AXIOM_TOKEN=${AXIOM_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vector.toml:/etc/vector/vector.toml:ro
    networks:
      - vocabnet

networks:
  vocabnet:
    driver: bridge

volumes:
  bot-data:
  redis-data:
  anki-profile:
  anki-sync-data:
  caddy-data:
  caddy-config:
