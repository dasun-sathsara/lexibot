# Single-VPS topology (architecture §3, plan §4/§12).
# Services: bot, anki-headless, caddy.
# Redis + the ARQ worker and the self-hosted sync server were removed: the bot now runs
# the pipeline in-process (architecture §8), and the headless Anki profile syncs to
# AnkiWeb via the copied, pre-authenticated profile (no in-container login).

x-vocab-image: &vocab-image
  image: ${VOCAB_IMAGE:-ghcr.io/appledore-labs/lexibot:latest}
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped

services:
  bot:
    <<: *vocab-image
    command: ["python", "-m", "lexibot"]
    volumes:
      - bot-data:/app/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vocabnet

  anki-headless:
    # Vendored copy of ThisIsntTheWay/headless-anki (architecture §3, deployment.md).
    # Runs headless with QT_QPA_PLATFORM=offscreen (no VNC/noVNC desktop stack), keeping
    # only Anki + AnkiConnect on a virtual surface. The /data volume holds a profile
    # already authenticated to AnkiWeb out-of-band; AnkiConnect is bound to 0.0.0.0 so
    # the bot can reach it on the internal network.
    build:
      context: ./deploy/anki-headless
      args:
        ANKI_VERSION: "25.02.7"
        ANKICONNECT_VERSION: "25.11.9.0"
        QT_VERSION: "6"
    restart: unless-stopped
    environment:
      - QT_QPA_PLATFORM=offscreen
      - ANKICONNECT_WILDCARD_ORIGIN=1
      # No SYNC_SERVER / ANKI_SYNC_* here: the copied profile syncs to AnkiWeb by default.
    volumes:
      - anki-profile:/data
      - anki-export:/export
    # AnkiConnect (8765) is reachable only on the internal network, never published.
    # To debug with a real surface, set QT_QPA_PLATFORM=vnc and uncomment the port below;
    # that exposes a debug VNC surface on 5900 (NOT for normal operation).
    # ports:
    #   - "5900:5900"
    expose:
      - "8765"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8765 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - vocabnet

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    depends_on:
      - bot
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - vocabnet

networks:
  vocabnet:
    driver: bridge

volumes:
  bot-data:
  anki-profile:
  anki-export:
  caddy-data:
  caddy-config:
